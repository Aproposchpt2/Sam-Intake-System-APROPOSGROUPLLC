[build]
  publish = "."
  functions = "netlify/functions"

  [build.environment]
    NODE_VERSION = "18"
    PDF_RENDERER = "adobe"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

[[redirects]]
  from = "/terms"
  to = "/terms.html"
  status = 200

[[redirects]]
  from = "/sms-consent"
  to = "/sms-consent.html"
  status = 200

[[redirects]]
  from = "/pipeline"
  to = "/pipeline-dashboard.html"
  status = 200

[[redirects]]
  from = "/capgen"
  to = "/capability-generator.html"
  status = 200

[[redirects]]
  from = "/apropos"
  to = "/ag-dashboard.html"
  status = 200

[[redirects]]
  from = "/pro"
  to = "/capgen-pro.html"
  status = 200

[[redirects]]
  from = "/pro/thankyou"
  to = "/capgen-pro-thankyou.html"
  status = 200

[[redirects]]
  from = "/offer"
  to = "/offer.html"
  status = 200

[[redirects]]
  from = "/welcome"
  to = "/welcome.html"
  status = 200

[[redirects]]
  from = "/onboarding"
  to = "/onboarding.html"
  status = 200

[[redirects]]
  from = "/signin"
  to = "/onboarding.html"
  status = 200

[[redirects]]
  from = "/signup"
  to = "/offer.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"